<svg width="1200" height="630" viewBox="0 0 1200 630" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Background -->
  <rect width="1200" height="630" fill="#0c0b0a"/>

  <!-- Grid Pattern -->
  <g opacity="0.05">
    <line x1="0" y1="0" x2="0" y2="630" stroke="#e8941a" stroke-width="1"/>
    <line x1="72" y1="0" x2="72" y2="630" stroke="#e8941a" stroke-width="1"/>
    <line x1="144" y1="0" x2="144" y2="630" stroke="#e8941a" stroke-width="1"/>
    <line x1="216" y1="0" x2="216" y2="630" stroke="#e8941a" stroke-width="1"/>
    <line x1="288" y1="0" x2="288" y2="630" stroke="#e8941a" stroke-width="1"/>
    <line x1="360" y1="0" x2="360" y2="630" stroke="#e8941a" stroke-width="1"/>
    <line x1="432" y1="0" x2="432" y2="630" stroke="#e8941a" stroke-width="1"/>
    <line x1="504" y1="0" x2="504" y2="630" stroke="#e8941a" stroke-width="1"/>
    <line x1="576" y1="0" x2="576" y2="630" stroke="#e8941a" stroke-width="1"/>
    <line x1="648" y1="0" x2="648" y2="630" stroke="#e8941a" stroke-width="1"/>
    <line x1="720" y1="0" x2="720" y2="630" stroke="#e8941a" stroke-width="1"/>
    <line x1="792" y1="0" x2="792" y2="630" stroke="#e8941a" stroke-width="1"/>
    <line x1="864" y1="0" x2="864" y2="630" stroke="#e8941a" stroke-width="1"/>
    <line x1="936" y1="0" x2="936" y2="630" stroke="#e8941a" stroke-width="1"/>
    <line x1="1008" y1="0" x2="1008" y2="630" stroke="#e8941a" stroke-width="1"/>
    <line x1="1080" y1="0" x2="1080" y2="630" stroke="#e8941a" stroke-width="1"/>
    <line x1="1152" y1="0" x2="1152" y2="630" stroke="#e8941a" stroke-width="1"/>
    <line x1="0" y1="0" x2="1200" y2="0" stroke="#e8941a" stroke-width="1"/>
    <line x1="0" y1="72" x2="1200" y2="72" stroke="#e8941a" stroke-width="1"/>
    <line x1="0" y1="144" x2="1200" y2="144" stroke="#e8941a" stroke-width="1"/>
    <line x1="0" y1="216" x2="1200" y2="216" stroke="#e8941a" stroke-width="1"/>
    <line x1="0" y1="288" x2="1200" y2="288" stroke="#e8941a" stroke-width="1"/>
    <line x1="0" y1="360" x2="1200" y2="360" stroke="#e8941a" stroke-width="1"/>
    <line x1="0" y1="432" x2="1200" y2="432" stroke="#e8941a" stroke-width="1"/>
    <line x1="0" y1="504" x2="1200" y2="504" stroke="#e8941a" stroke-width="1"/>
    <line x1="0" y1="576" x2="1200" y2="576" stroke="#e8941a" stroke-width="1"/>
  </g>

  <!-- Radial Gradient Glow -->
  <ellipse cx="600" cy="315" rx="500" ry="300" fill="url(#ogGradient)" opacity="0.15"/>

  <!-- Decorative Hexagon -->
  <polygon points="900,315 1021,385 1021,455 900,525 779,455 779,385" stroke="#e8941a" stroke-width="1" fill="none" opacity="0.2"/>
  <polygon points="900,345 991,395 991,435 900,485 809,435 809,395" stroke="#e8941a" stroke-width="0.5" fill="rgba(232,148,26,0.05)" opacity="0.3"/>

  <!-- Main Content Area -->
  <g transform="translate(80, 180)">
    <!-- Logo/Branding -->
    <text x="0" y="0" font-family="system-ui, -apple-system, sans-serif" font-size="48" font-weight="800" fill="#f0ebe2" letter-spacing="-0.02em">RW<tspan fill="#e8941a">.</tspan></text>

    <!-- Name -->
    <text x="0" y="80" font-family="system-ui, -apple-system, sans-serif" font-size="72" font-weight="900" fill="#f0ebe2" letter-spacing="-0.04em">Rio Wicaksono</text>

    <!-- Title -->
    <text x="0" y="130" font-family="system-ui, -apple-system, sans-serif" font-size="28" font-weight="600" fill="#e8941a" letter-spacing="0.05em">IT CONSULTANT</text>

    <!-- Divider -->
    <rect x="0" y="160" width="200" height="2" fill="#e8941a" opacity="0.6"/>

    <!-- Tagline -->
    <text x="0" y="210" font-family="system-ui, -apple-system, sans-serif" font-size="20" font-weight="400" fill="rgba(240,235,226,0.6)" letter-spacing="0.01em">System Deployment • SIT/UAT • BRD Analysis</text>
    <text x="0" y="245" font-family="system-ui, -apple-system, sans-serif" font-size="20" font-weight="400" fill="rgba(240,235,226,0.6)" letter-spacing="0.01em">Digital Transformation • Insurance Tech</text>
  </g>

  <!-- Stats Badges -->
  <g transform="translate(80, 520)">
    <rect x="0" y="0" width="140" height="60" rx="12" fill="rgba(232,148,26,0.1)" stroke="rgba(232,148,26,0.25)"/>
    <text x="70" y="28" font-family="system-ui, -apple-system, sans-serif" font-size="28" font-weight="900" fill="#e8941a" text-anchor="middle">5+</text>
    <text x="70" y="48" font-family="system-ui, -apple-system, sans-serif" font-size="11" font-weight="500" fill="rgba(240,235,226,0.6)" text-anchor="middle" letter-spacing="0.08em">YEARS EXP</text>

    <rect x="160" y="0" width="140" height="60" rx="12" fill="rgba(232,148,26,0.1)" stroke="rgba(232,148,26,0.25)"/>
    <text x="230" y="28" font-family="system-ui, -apple-system, sans-serif" font-size="28" font-weight="900" fill="#e8941a" text-anchor="middle">10+</text>
    <text x="230" y="48" font-family="system-ui, -apple-system, sans-serif" font-size="11" font-weight="500" fill="rgba(240,235,226,0.6)" text-anchor="middle" letter-spacing="0.08em">PROJECTS</text>

    <rect x="320" y="0" width="140" height="60" rx="12" fill="rgba(232,148,26,0.1)" stroke="rgba(232,148,26,0.25)"/>
    <text x="390" y="28" font-family="system-ui, -apple-system, sans-serif" font-size="28" font-weight="900" fill="#e8941a" text-anchor="middle">5+</text>
    <text x="390" y="48" font-family="system-ui, -apple-system, sans-serif" font-size="11" font-weight="500" fill="rgba(240,235,226,0.6)" text-anchor="middle" letter-spacing="0.08em">COUNTRIES</text>
  </g>

  <!-- Decorative Elements -->
  <circle cx="1050" cy="100" r="4" fill="#e8941a" opacity="0.6"/>
  <circle cx="1100" cy="150" r="3" fill="#e8941a" opacity="0.4"/>
  <circle cx="1080" cy="200" r="2" fill="#e8941a" opacity="0.3"/>

  <!-- Terminal Icon -->
  <g transform="translate(950, 480)">
    <rect width="120" height="80" rx="8" fill="rgba(232,148,26,0.08)" stroke="#e8941a" stroke-width="1" opacity="0.5"/>
    <text x="20" y="35" font-family="monospace" font-size="14" font-weight="600" fill="#e8941a" opacity="0.8">&gt;_</text>
    <text x="20" y="55" font-family="monospace" font-size="10" fill="#e8941a" opacity="0.4">deploy</text>
  </g>

  <!-- Gradient Definition -->
  <defs>
    <radialGradient id="ogGradient" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0%" stop-color="#e8941a" stop-opacity="0.8"/>
      <stop offset="100%" stop-color="#e8941a" stop-opacity="0"/>
    </radialGradient>
  </defs>
</svg>
